<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo circular en verde oliva (el color de la boda) -->
  <circle cx="50" cy="50" r="48" fill="#556B2F" />
  
  <!-- Corona de olivo simplificada en dorado -->
  <path d="M50 10 C 30 10, 15 30, 15 50 C 15 70, 30 90, 50 90" fill="none" stroke="#C5A059" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  <path d="M50 10 C 70 10, 85 30, 85 50 C 85 70, 70 90, 50 90" fill="none" stroke="#C5A059" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  
  <!-- Iniciales D&G en tipografía elegante -->
  <text x="50" y="62" font-family="serif" font-size="38" fill="#C5A059" text-anchor="middle" font-weight="bold">D&amp;G</text>
  
  <!-- Brillo sutil -->
  <circle cx="30" cy="30" r="5" fill="white" opacity="0.1" />
</svg>